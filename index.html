<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>tiggox — anytime crypto</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#000000" />

  <!-- iOS -->
  <link rel="apple-touch-icon" href="/icon.png" />
  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  />
  <meta
    name="apple-mobile-web-app-status-bar-style"
    content="black-translucent"
  />

  <link rel="icon" href="/icon.png" />

  <!-- Google Analytics -->
  <script
    async
    src="https://www.googletagmanager.com/gtag/js?id=G-7G6NKTQ824"
  ></script>

  <script>
    window.dataLayer = window.dataLayer || [];

    function gtag() {
      dataLayer.push(arguments);
    }

    gtag("js", new Date());

    gtag("config", "G-7G6NKTQ824");

    gtag("event", "page_view_custom");

    setTimeout(() => {
      gtag("event", "engaged_user");
    }, 10000);
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #000000;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 520px;
      text-align: center;
    }

    .logo {
      width: 90px;
      margin-bottom: 24px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeIn 1.2s ease forwards;
    }

    h1 {
      font-size: 2.6rem;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .launch {
      color: #888888;
      font-size: 0.95rem;
      margin-top: 8px;
      margin-bottom: 28px;
    }

    #countdown {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    button {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #333333;
      background: transparent;
      color: white;
      cursor: pointer;
      transition: .3s;
      font-size: 16px;
    }

    button:hover {
      border-color: #FFD700;
      color: #FFD700;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .form {
      display: none;
      flex-direction: column;
      gap: 14px;
      margin-top: 24px;
    }

    input {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid #333333;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #FFD700;
    }

    .success {
      display: none;
      margin-top: 30px;
      text-align: left;
      line-height: 1.8;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 20px;
    }

    .footer {
      margin-top: 45px;
      color: #FFD700;
      font-family: Merriweather, serif;
      font-size: .95rem;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

</head>

<body>

<div class="container">

  <img
    src="logo.png"
    class="logo"
    alt="tiggox logo"
    loading="lazy"
  >

  <h1 id="title">
    Coming Soon
  </h1>

  <div id="countdown"></div>

  <div
    class="launch"
    id="launchText"
  >
    Launching August 9, 2026 • 13:00 UTC
  </div>

  <button id="ctaBtn">
    Join Waitlist
  </button>

  <div
    class="form"
    id="form"
  >

    <input
      id="name"
      type="text"
      placeholder="Name"
    >

    <input
      id="email"
      type="email"
      placeholder="Email"
    >

    <input
      id="country"
      type="text"
      placeholder="Country"
    >

    <button id="submitBtn">
      Join Now
    </button>

  </div>

  <div
    id="success"
    class="success"
  ></div>

  <div class="footer">
    Powered by TIGGCOIN
  </div>

</div>

<script>

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/service-worker.js");
  });
}

const launchDate = new Date(
  "2026-08-09T13:00:00Z"
).getTime();

const liveURL =
"https://tiggox.com/dashboard";

let redirected = false;

function pad(value) {
  return String(value).padStart(2, "0");
}
  setInterval(() => {

  const now = Date.now();

  const diff = launchDate - now;

  if (diff <= 0) {

    document.getElementById("title").textContent = "We're Live";

    document.getElementById("countdown").textContent = "We're Live";

    document.getElementById("launchText").style.display = "none";

    const btn = document.getElementById("ctaBtn");

    btn.textContent = "Entering tiggox...";

    btn.disabled = true;

    if (!redirected) {

      redirected = true;

      setTimeout(() => {
        window.location.href = liveURL;
      }, 2500);

    }

    return;

  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));

  const hours = Math.floor(
    (diff / (1000 * 60 * 60)) % 24
  );

  const minutes = Math.floor(
    (diff / (1000 * 60)) % 60
  );

  const seconds = Math.floor(
    (diff / 1000) % 60
  );

  document.getElementById("countdown").textContent =
    `${pad(days)}d ${pad(hours)}h ${pad(minutes)}m ${pad(seconds)}s`;

}, 1000);


const ctaBtn = document.getElementById("ctaBtn");

ctaBtn.addEventListener("click", () => {

  gtag("event", "waitlist_click");

  ctaBtn.style.display = "none";

  document.getElementById("form").style.display = "flex";

  gtag("event", "form_open");

});


document
.getElementById("submitBtn")
.addEventListener("click", submitForm);


async function submitForm() {

  const name =
    document.getElementById("name").value.trim();

  const email =
    document.getElementById("email").value.trim();

  const country =
    document.getElementById("country").value.trim();


  if (!name || !email || !country) {

    alert("Please complete all fields.");

    return;

  }

  const emailRegex =
    /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  if (!emailRegex.test(email)) {

    alert("Please enter a valid email address.");

    return;

  }

  const submitBtn =
    document.getElementById("submitBtn");

  submitBtn.disabled = true;

  submitBtn.textContent = "Joining...";

  try {

    const response = await fetch(

      "https://script.google.com/macros/s/AKfycbzvJuDpcXtsC3OxrkcSwyBzEfIu8ZHGfO5mg8kqCtaELsZ_lbzMaPP3E_kj-2udmIBjfQ/exec",

      {

        method: "POST",

        headers: {

          "Content-Type": "application/json"

        },

        body: JSON.stringify({

          name,
          email,
          country

        })

      }

    );

    if (!response.ok) {

      throw new Error("Submission failed");

    }

    gtag("event", "waitlist_signup");

    document.getElementById("form").style.display = "none";

    const success =
      document.getElementById("success");

    success.style.display = "block";

    success.innerHTML = `

      <strong>Welcome, ${name}! 🚀</strong>

      <br><br>

      Your place on the
      <strong>TIGGOX Waitlist</strong>
      has been reserved.

      <br><br>

      <strong>Name</strong><br>
      ${name}

      <br><br>

      <strong>Email</strong><br>
      ${email}

      <br><br>

      We'll send you:

      <br><br>

      • Product updates<br>
      • Launch announcements<br>
      • Feature releases<br>
      • Ecosystem news

      <br><br>

      Thank you for joining us as we build the future of crypto and finance.

      <br><br>

      <strong>Anytime Crypto.</strong>

      <br><br>

      — TIGGOX

    `;

  } catch (error) {

    alert(
      "Unable to join the waitlist. Please try again."
    );

    submitBtn.disabled = false;

    submitBtn.textContent = "Join Now";

  }

}

</script>

</body>

</html>
